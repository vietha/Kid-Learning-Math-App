<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History — Math Champions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="screen" style="padding-top:16px;gap:16px">

    <div style="width:100%;display:flex;align-items:center;justify-content:space-between">
      <button class="back-btn" onclick="window.location.href='index.html'">← Home</button>
      <div class="app-title" style="font-size:1.3rem;-webkit-text-fill-color:unset;color:var(--text)">🕘 History</div>
      <div style="width:60px"></div>
    </div>

    <div class="subnav-row">
      <button class="subnav-btn active">🕘 History</button>
      <button class="subnav-btn" onclick="window.location.href='analytics.html'">📊 Analysis</button>
    </div>

    <div class="card current-kid-card">
      <div class="section-label" style="margin-bottom:12px">Viewing history for</div>
      <div class="current-kid-row">
        <div id="current-kid-avatar" class="mini-avatar-circle">🦊</div>
        <div>
          <div id="current-kid-name" class="current-kid-name">Kid</div>
          <div class="current-kid-subtitle">Practice, review, and test sessions for this kid.</div>
        </div>
        <button id="btn-switch-kid" class="switch-kid-btn">Switch Kid</button>
      </div>
    </div>

    <div class="card">
      <div class="setting-label" style="margin-bottom:12px">Filter history</div>
      <div class="chip-group history-filter-group">
        <button class="chip selected" data-range="7">7 days</button>
        <button class="chip" data-range="30">Last month</button>
        <button class="chip" data-range="0">All time</button>
      </div>
    </div>

    <div id="empty-state" class="hidden" style="text-align:center;padding:40px 0;width:100%">
      <div style="font-size:4rem">📚</div>
      <div style="font-size:1.1rem;font-weight:800;color:var(--text);margin-top:12px">No activity yet!</div>
      <div style="font-size:0.9rem;font-weight:600;color:var(--text-light);margin-top:6px">
        Finish a practice or test session to build this kid's history.
      </div>
      <button class="settings-save-btn" style="margin-top:24px;max-width:280px"
              onclick="window.location.href='index.html'">Start Learning</button>
    </div>

    <div id="content" class="hidden" style="width:100%;display:flex;flex-direction:column;gap:16px">
      <div class="stat-row">
        <div class="stat-card">
          <div id="hist-total" class="stat-value">0</div>
          <div class="stat-label">Sessions</div>
        </div>
        <div class="stat-card">
          <div id="hist-practice" class="stat-value">0</div>
          <div class="stat-label">Practice</div>
        </div>
        <div class="stat-card">
          <div id="hist-test" class="stat-value">0</div>
          <div class="stat-label">Tests</div>
        </div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px">
          <div class="setting-label" style="margin-bottom:0">Session history</div>
          <button id="btn-clear" class="clear-btn">🗑️ Clear all</button>
        </div>
        <div id="history-list"></div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    requireLogin();
    const currentKid = Accounts.currentAccount();
    document.getElementById('current-kid-avatar').textContent = currentKid?.avatar || '🦊';
    document.getElementById('current-kid-avatar').style.background = currentKid?.color || 'var(--primary)';
    document.getElementById('current-kid-name').textContent = Storage.getPlayerName();
    document.getElementById('btn-switch-kid').addEventListener('click', () => {
      Accounts.logout();
      window.location.replace('login.html');
    });

    const activity = Storage.getActivityHistory();
    let activeRange = 7;

    document.querySelectorAll('.history-filter-group .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        activeRange = Number(chip.dataset.range);
        document.querySelectorAll('.history-filter-group .chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
        render();
      });
    });

    function render() {
      const filtered = filterActivityByDays(activity, activeRange);
      const content = document.getElementById('content');
      const empty = document.getElementById('empty-state');

      if (!filtered.length) {
        content.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');
      content.classList.remove('hidden');
      renderSummary(filtered);
      renderHistoryList(filtered);
    }

    function renderSummary(filtered) {
      const practiceCount = filtered.filter(item => item.kind !== 'test').length;
      const testCount = filtered.filter(item => item.kind === 'test').length;
      document.getElementById('hist-total').textContent = filtered.length;
      document.getElementById('hist-practice').textContent = practiceCount;
      document.getElementById('hist-test').textContent = testCount;
    }

    function renderHistoryList(filtered) {
      const container = document.getElementById('history-list');
      const KIND_META = {
        practice: { icon: '📚', label: 'Practice' },
        review:   { icon: '📖', label: 'Review' },
        test:     { icon: '📝', label: 'Test' }
      };

      container.innerHTML = filtered.map((entry, i) => {
        const meta = KIND_META[entry.kind] || KIND_META.practice;
        const divider = i < filtered.length - 1 ? 'history-item-divider' : '';
        const score = entry.total ? `${entry.score}/${entry.total}` : '—';
        const detail = entry.kind === 'test'
          ? `${meta.label} • ${entry.difficulty || 'medium'}`
          : `${meta.label} • ${entry.label || 'Mixed'}`;

        return `
          <div class="history-item ${divider}">
            <div class="history-item-top">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <span class="session-badge">${meta.icon} ${detail}</span>
                <span class="history-year">Year ${entry.year}</span>
                <span class="history-date">${formatDate(entry.date)}</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px;white-space:nowrap">
                <span class="history-score">${score}</span>
                ${entry.pct != null ? `<span class="history-pct">${entry.pct}%</span>` : ''}
              </div>
            </div>
            <div class="history-item-bottom">
              <div class="hist-ops-row">
                ${entry.op && entry.op !== 'mixed' ? `<span class="hist-op-badge op-bg-${entry.op}">${OP_SYMBOLS[entry.op]} ${entry.label}</span>` : `<span class="hist-op-badge mixed-badge">${entry.label || 'Mixed'}</span>`}
              </div>
              ${entry.timeTaken ? `<span class="history-time">⏱ ${formatTime(entry.timeTaken)}</span>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    document.getElementById('btn-clear').addEventListener('click', () => {
      if (confirm('Delete all saved history and analytics for this kid? This cannot be undone.')) {
        Storage.clearActivityHistory();
        Storage.clearTestHistory();
        window.location.reload();
      }
    });

    render();
  </script>

  <footer class="app-footer">2026 <a class="app-footer-link" href="https://designveloper.com" target="_blank" rel="noreferrer">Designveloper.com</a></footer>

</body>
</html>
