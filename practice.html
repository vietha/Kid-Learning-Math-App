<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice — Math Champions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top bar -->
  <div class="top-bar">
    <span id="progress-text" class="progress-text">Q 1 / 10</span>
    <span id="op-badge" class="op-badge">+</span>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar-wrap">
    <div id="progress-fill" class="progress-bar-fill" style="width:0%"></div>
  </div>

  <!-- Encouraging message -->
  <p id="encourage" class="encourage-msg">&nbsp;</p>

  <!-- Question card -->
  <div id="question-card" class="question-card">
    <div id="question-text" class="question-text">? + ? = ?</div>
    <div id="answer-display" class="answer-display">_</div>
  </div>

  <!-- Numpad -->
  <div class="numpad-wrap" style="margin-top:16px">
    <div class="numpad">
      <button class="num-btn" data-val="7">7</button>
      <button class="num-btn" data-val="8">8</button>
      <button class="num-btn" data-val="9">9</button>
      <button class="num-btn" data-val="4">4</button>
      <button class="num-btn" data-val="5">5</button>
      <button class="num-btn" data-val="6">6</button>
      <button class="num-btn" data-val="1">1</button>
      <button class="num-btn" data-val="2">2</button>
      <button class="num-btn" data-val="3">3</button>
      <button class="num-btn backspace" id="btn-back">⌫</button>
      <button class="num-btn" data-val="0">0</button>
      <button class="num-btn submit" id="btn-submit">✓</button>
    </div>
  </div>

  <!-- Feedback overlay -->
  <div id="feedback" class="feedback-overlay">
    <div id="feedback-emoji" class="feedback-emoji">✅</div>
    <div id="feedback-msg" class="feedback-msg correct"></div>
    <div id="feedback-correct-ans" class="feedback-correct-ans"></div>
    <!-- Only shown on wrong answers -->
    <div id="feedback-actions" class="feedback-actions hidden">
      <button id="btn-retry" class="feedback-btn retry">🔄 Try Again</button>
      <button id="btn-skip"  class="feedback-btn skip">⏭ Skip</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    requireLogin();

    const params   = getParams();
    const year     = params.year || 2;
    const op       = params.op   || 'add';
    const isReview = params.mode === 'review';

    let session;
    if (isReview) {
      const wrongQs = Storage.getWrongQuestions();
      Storage.clearWrongQuestions();
      session = new MathSession(year, 'mixed', wrongQs.length, wrongQs);
    } else {
      session = new MathSession(year, op, Settings.get('practiceCount'));
    }

    const $progress  = document.getElementById('progress-text');
    const $fill      = document.getElementById('progress-fill');
    const $badge     = document.getElementById('op-badge');
    const $qtext     = document.getElementById('question-text');
    const $ans       = document.getElementById('answer-display');
    const $encourage = document.getElementById('encourage');
    const $feedback  = document.getElementById('feedback');
    const $fbEmoji   = document.getElementById('feedback-emoji');
    const $fbMsg     = document.getElementById('feedback-msg');
    const $fbAns     = document.getElementById('feedback-correct-ans');
    const $fbActions = document.getElementById('feedback-actions');
    const $submit    = document.getElementById('btn-submit');
    const $card      = document.getElementById('question-card');

    if (isReview) {
      $badge.textContent = '📖 Review';
      $badge.className   = 'op-badge mixed';
    } else {
      $badge.textContent = OP_SYMBOLS[op];
      $badge.className   = `op-badge ${op}`;
    }

    let answer  = '';
    let blocked = false;

    // --- Display helpers ---
    function refreshDisplay() {
      $ans.textContent = answer || '_';
      $ans.classList.toggle('has-value', answer.length > 0);
    }

    function hideOverlay() {
      $feedback.className = 'feedback-overlay';
      $fbActions.classList.add('hidden');
    }

    // --- Show a question ---
    function showQuestion() {
      const q = session.currentQuestion;
      if (!q) return;

      answer  = '';
      blocked = false;
      $submit.disabled = false;

      $qtext.textContent    = q.text;
      $progress.textContent = `Q ${session.current + 1} / ${session.count}`;
      $fill.style.width     = `${(session.current / session.count) * 100}%`;

      refreshDisplay();

      if (session.current === 0) {
        const name = Storage.getPlayerName();
        $encourage.textContent = name ? `Good luck, ${name}! 🌟` : 'Good luck! 🌟';
      } else {
        $encourage.textContent = randFrom(ENCOURAGE_MSGS);
      }

      $card.classList.remove('animate-bounce-in');
      void $card.offsetWidth;
      $card.classList.add('animate-bounce-in');
    }

    // --- Correct: celebrate then auto-advance ---
    function showCorrect() {
      blocked = true;
      $submit.disabled = true;
      $fbActions.classList.add('hidden');

      $feedback.className  = 'feedback-overlay show correct-bg';
      $fbEmoji.textContent = randFrom(['🎉','✨','⭐','🌟','💫','🥳','👏','🎊']);
      $fbMsg.textContent   = randFrom(CORRECT_MSGS);
      $fbMsg.className     = 'feedback-msg correct';
      $fbAns.textContent   = '';

      playSound('correct');

      setTimeout(() => {
        hideOverlay();
        if (session.isFinished) goToResults();
        else showQuestion();
      }, 1300);
    }

    // --- Wrong: show Try Again / Skip buttons, don't submit yet ---
    function showWrong(expected) {
      blocked = true;
      $submit.disabled = true;

      $feedback.className  = 'feedback-overlay show wrong-bg';
      $fbEmoji.textContent = randFrom(['😮','🤔','💪','😅','🙈']);
      $fbMsg.textContent   = randFrom(WRONG_MSGS);
      $fbMsg.className     = 'feedback-msg wrong';
      $fbAns.textContent   = `The answer was ${expected}`;
      $fbActions.classList.remove('hidden');

      playSound('wrong');
      $card.classList.add('animate-shake');
      setTimeout(() => $card.classList.remove('animate-shake'), 500);
    }

    // --- Submit ---
    function submit() {
      if (blocked || answer === '') return;
      const q = session.currentQuestion;
      if (Number(answer) === q.answer) {
        // Correct — record and celebrate
        session.submitAnswer(Number(answer));
        showCorrect();
      } else {
        // Wrong — show overlay with choice, don't record yet
        showWrong(q.answer);
      }
    }

    // --- Try Again: dismiss overlay, let kid retry same question ---
    document.getElementById('btn-retry').addEventListener('click', () => {
      hideOverlay();
      answer  = '';
      blocked = false;
      $submit.disabled = false;
      refreshDisplay();
      $encourage.textContent = "You can do it! 💪";
    });

    // --- Skip: record as wrong, move on ---
    document.getElementById('btn-skip').addEventListener('click', () => {
      hideOverlay();
      session.submitAnswer(-9999); // guaranteed wrong
      if (session.isFinished) goToResults();
      else showQuestion();
    });

    // --- Navigate to results ---
    function goToResults() {
      if (isReview) {
        window.location.href = buildURL('results.html', {
          year,
          mode:  'review',
          score: session.score,
          total: session.count,
          stars: session.stars,
          best:  0
        });
      } else {
        const isNewBest = Storage.setBestScore(year, `practice_${op}`, session.score, session.count);
        window.location.href = buildURL('results.html', {
          year, op,
          mode:  'practice',
          score: session.score,
          total: session.count,
          stars: session.stars,
          best:  isNewBest ? 1 : 0
        });
      }
    }

    // --- Numpad events ---
    document.querySelectorAll('.num-btn[data-val]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (blocked || answer.length >= 6) return;
        answer += btn.dataset.val;
        refreshDisplay();
        playSound('numpad');
      });
    });

    document.getElementById('btn-back').addEventListener('click', () => {
      if (blocked) return;
      answer = answer.slice(0, -1);
      refreshDisplay();
    });

    $submit.addEventListener('click', submit);

    // --- Keyboard support ---
    document.addEventListener('keydown', e => {
      if (blocked) return;
      if (e.key >= '0' && e.key <= '9' && answer.length < 6) {
        answer += e.key; refreshDisplay();
      } else if (e.key === 'Backspace') {
        answer = answer.slice(0, -1); refreshDisplay();
      } else if (e.key === 'Enter') {
        submit();
      }
    });

    // --- Start ---
    showQuestion();
  </script>

</body>
</html>
